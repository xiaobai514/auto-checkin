name: 每日自动签到

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC+8 → UTC 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发，方便调试

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 修复 Ubuntu 24.04 依赖兼容性
        run: sudo apt-get update && sudo -S -p '' apt-get install -y libasound2t64

      - name: 安装 Playwright 浏览器
        run: playwright install chromium --with-deps

      - name: 执行每日签到
        env:
          SITE1_EMAIL: ${{ secrets.SITE1_EMAIL }}
          SITE1_PASS:  ${{ secrets.SITE1_PASS }}
          SITE2_EMAIL: ${{ secrets.SITE2_EMAIL }}
          SITE2_PASS:  ${{ secrets.SITE2_PASS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python checkin.py

      - name: 上传调试截图（仅失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          retention-days: 3
