name: 每日自动签到

on:
  schedule:
    # 每天北京时间 00:30 运行（UTC+8 → UTC 16:30）
    - cron: "30 16 * * *"
  workflow_dispatch:  # 允许手动触发，方便调试

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1 \
            xvfb

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 执行每日签到
        env:
          SITE1_EMAIL_1: ${{ secrets.SITE1_EMAIL_1 }}
          SITE1_PASS_1:  ${{ secrets.SITE1_PASS_1 }}
          SITE1_EMAIL_2: ${{ secrets.SITE1_EMAIL_2 }}
          SITE1_PASS_2:  ${{ secrets.SITE1_PASS_2 }}
          SITE2_EMAIL_1: ${{ secrets.SITE2_EMAIL_1 }}
          SITE2_PASS_1:  ${{ secrets.SITE2_PASS_1 }}
          SITE2_EMAIL_2: ${{ secrets.SITE2_EMAIL_2 }}
          SITE2_PASS_2:  ${{ secrets.SITE2_PASS_2 }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:   ${{ secrets.SMTP_PORT }}
          SMTP_USER:   ${{ secrets.SMTP_USER }}
          SMTP_PASS:   ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          # 使用 xvfb-run 提供虚拟显示
          xvfb-run --auto-servernum python checkin.py

      - name: 上传调试截图（仅失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/*.png
          retention-days: 3
